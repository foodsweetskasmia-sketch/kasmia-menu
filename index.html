
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منيو كاسمية</title>

<style>
body{
    font-family: Arial;
    background:#fff8f0;
    padding:20px;
    text-align:center;
    direction:rtl;
}

h1{
    color:#d35400;
}

.item{
    background:white;
    margin:15px auto;
    padding:15px;
    border-radius:15px;
    max-width:300px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.price{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>منيو كاسمية</h1>

<div class="item">
<h2>كريب شوكولا</h2>
<p class="price">5$</p>
</div>

<div class="item">
<h2>وافل</h2>
<p class="price">4$</p>
</div>

<div class="item">
<h2>ميلك شيك</h2>
<p class="price">3$</p>
</div>

</body>
</html>
